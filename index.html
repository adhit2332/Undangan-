<!DOCTYPE html>
<html>
<head>
  <title>Undangan Pernikahan</title>
  <style>
    body { font-family: Arial; background: #fdf6f0; text-align: center; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h1 { color: #c0392b; }
    h2 { color: #27ae60; }
    img { width: 100%; border-radius: 10px; margin: 15px 0; }
    .tanggal { margin: 20px 0; font-size: 18px; }
    button { padding:14px 24px; background:#27ae60; color:white; border:none; border-radius:12px; font-weight:bold; font-size:16px; margin:15px 0; cursor:pointer; }
    button:hover { background:#219150; }
  </style>
</head>
<body>

<!-- KODE AUDIO - PASTIKAN NAMA FILE SAMA -->
<audio id="bgm" loop>
  <source src="bulan-ksatria.mp3" type="audio/mpeg">
</audio>

<div class="card">
  <h1>Undangan Pernikahan</h1>
  <h2>ADHITYA RIZKY & YESICA PUTRI</h2>
  
  <img src="https://files.catbox.moe/i3kk8y.jpg" alt="Foto">
  
  <p>Dengan memohon rahmat Allah SWT, kami mengundang Anda</p>
  
  <div class="tanggal">
    <b>Akad & Resepsi</b><br>
    Minggu, 20 Desember 2026<br>
    Gedung Serbaguna Jakarta
  </div>

  <!-- TOMBOL IJO BUAT PUTAR MUSIK -->
  <button onclick="var a=document.getElementById('bgm'); a.paused ? a.play() : a.pause(); this.innerHTML = a.paused ? '🎵 Putar Musik' : '⏸️ Pause Musik'">
    🎵 Putar Musik
  </button>
  
  <h3>Hitung Mundur</h3>
  <div class="countdown" id="countdown"></div>

  <a href="https://maps.google.com/?q=Gedung+Serbaguna+Jakarta" target="_blank">
    <button style="background:#2980b9;">📍 Buka Maps</button>
  </a>

  <h3>Konfirmasi Kehadiran</h3>
  <input type="text" id="namaTamu" placeholder="Nama Anda"><br><br>
  <select id="status">
    <option value="Hadir">Hadir</option>
    <option value="Tidak Hadir">Tidak Hadir</option>
  </select><br><br>
  <button style="background:#8e44ad;" onclick="alert('Terima kasih konfirmasinya!')">Kirim</button>
</div>

</body>
</html>
