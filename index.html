<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan Adhit & Yesica</title>
<style>
    * { scroll-behavior: smooth; }
  body { 
    font-family: 'Georgia', serif; 
    background: #0a0a0a; /* AWAL HITAM */
    text-align: center; 
    padding: 0 0 100px 0; 
    margin: 0;
    overflow-x: hidden;
  }

  /* BACKGROUND FOTO DARK GOLD */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url('https://files.catbox.moe/i3kk8y.jpg');
    background-size: cover;
    background-position: center;
    filter: brightness(0.5) sepia(0.3) hue-rotate(25deg); /* EFEK GOLD */
    z-index: -2;
    opacity: 0;
    transition: opacity 2s ease-in;
  }
  body.background-on::before { opacity: 1; }
  body.background-on::after { /* OVERLAY GOLD */
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(139,69,19,0.3) 100%); 
    z-index: -1;
  }
  
  section { padding: 50px 20px; opacity: 0; transform: translateY(60px); transition: all 1.2s ease; } 
  section.show { opacity: 1; transform: translateY(0); }
  #rsvp { padding-bottom: 140px !important; }
  
  .card { 
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(20px);
    border: 2px solid #D4AF37; /* BORDER EMAS */
    padding: 30px; 
    border-radius: 25px; 
    max-width: 500px; 
    margin: 20px auto; 
    box-shadow: 0 0 30px rgba(212,175,55,0.4); /* GLOW EMAS */
  }
  h1, h2, p { color: #D4AF37; text-shadow: 0 0 10px rgba(212,175,55,0.7); } /* TEKS EMAS */
  h1 { font-size: 40px; }
  img { width: 100%; border-radius: 15px; margin: 15px 0; border: 3px solid #D4AF37; }
  input, select, textarea { padding: 10px; border-radius: 8px; border: 1px solid #D4AF37; background: rgba(0,0,0,0.5); color: #D4AF37; width: 80%; margin: 5px 0; }

  .countdown { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
  .count-box { background: rgba(212,175,55,0.2); border: 1px solid #D4AF37; padding: 15px 10px; border-radius: 15px; width: 70px; }
  .count-box .angka { font-size: 24px; font-weight: bold; color: #D4AF37; }
  .count-box .label { font-size: 12px; color: #D4AF37; }

  button { padding:14px 24px; background:linear-gradient(135deg, #D4AF37, #FFD700); color:#000; border:none; border-radius:50px; font-weight:bold; cursor:pointer; margin: 5px; box-shadow: 0 0 15px rgba(212,175,55,0.6); }

  .navbar { 
    position: fixed; bottom: 0; left: 0; width: 100%; height: 55px;
    background: rgba(0,0,0,0.9); border-top: 2px solid #D4AF37;
    display: flex; justify-content: space-around; padding: 5px 0; 
    box-shadow: 0 -2px 20px rgba(212,175,55,0.3); z-index: 999;
  }
  .navbar a { text-decoration: none; color: #D4AF37; font-size: 9px; text-align: center;}

  #opening {
    position: fixed; width: 100%; height: 100%;
    background: #0a0a0a; /* HITAM */
    display: flex; justify-content: center; align-items: center;
    flex-direction: column; z-index: 9999;
  }
  #opening h1, #opening p { color: #D4AF37; }

  .leaf { position: fixed; top: -50px; z-index: 1; font-size: 24px; animation: fall linear infinite; }
  @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

  .confetti { position: fixed; width: 10px; height: 10px; background: #FFD700; top: -10px; z-index: 10000; animation: confetti-fall 3s linear forwards; } /* CONFETTI EMAS */
  @keyframes confetti-fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  /* TAMBAHAN CSS MAPS + UCAPAN */
  .maps-box{margin:20px 0; border-radius:15px; overflow:hidden; border:2px solid #D4AF37; box-shadow:0 0 20px rgba(212,175,55,0.4);}
  .maps-box iframe{width:100%; height:300px; border:0;}
  .btn-maps{margin-top:15px; background:linear-gradient(135deg, #D4AF37, #FFD700); color:#000; text-decoration:none; padding:12px 20px; border-radius:50px; font-weight:bold; display:inline-block; box-shadow: 0 0 15px rgba(212,175,55,0.6);}
  
  .form-ucapan{display:flex; flex-direction:column; gap:10px; margin-top:15px;}
  .form-ucapan input, .form-ucapan textarea{width:100%; box-sizing:border-box;}
  .daftar-ucapan{margin-top:20px; max-height:300px; overflow-y:auto; text-align:left;}
  .item-ucapan{background:rgba(212,175,55,0.1); border-left:3px solid #D4AF37; padding:10px; margin:10px 0; border-radius:8px;}
  .item-ucapan b{color:#FFD700;}
</style>
</head>
<body>
